spring.application.name=perfumeriaspa
server.port=8080

# === SQLite Database ===
spring.datasource.url=jdbc:sqlite:perfumeria.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=

# === Hibernate / JPA ===
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# === Flyway ===
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# === JWT ===
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000

# === Feign Client (microservicio usuarios) ===
usuarios.service.url=http://localhost:8081
spring.cloud.openfeign.client.config.default.connectTimeout=5000
spring.cloud.openfeign.client.config.default.readTimeout=5000

# === Logging estructurado ===
logging.level.com.example.perfumeriaspa=DEBUG
logging.level.org.springframework.security=INFO

# === SQLite compatibility ===
spring.jpa.properties.hibernate.globally_quoted_identifiers=false

# === Performance ===
spring.jpa.open-in-view=false
